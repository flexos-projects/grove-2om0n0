<div style="position:fixed;top:12px;right:12px;z-index:9999;background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:10px 12px;display:flex;flex-direction:column;gap:6px;font-family:var(--font-ui)">

  <select id="guest-picker" style="font-size:0.75rem;background:var(--color-surface-raised);border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:4px 10px;color:var(--color-text-secondary);cursor:pointer"></select>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script>
const db = window.MOCK_DB
const helpers = db.helpers

// Utility
function getInitials(name) {
  return name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase()
}

function formatDate(isoDate) {
  if (!isoDate) return 'N/A'
  const d = new Date(isoDate)
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
}

function relativeDate(isoDate) {
  if (!isoDate) return 'N/A'
  const d = new Date(isoDate)
  const now = new Date('2026-03-15')
  const diffDays = Math.floor((now - d) / 86400000)
  if (diffDays === 0) return 'Today'
  if (diffDays === 1) return 'Yesterday'
  if (diffDays < 7) return diffDays + ' days ago'
  return formatDate(isoDate)
}

function showToast(message, type) {
  type = type || 'success'
  const c = document.getElementById('toast-container')
  const t = document.createElement('div')
  t.className = 'toast toast-' + type
  t.textContent = message
  c.appendChild(t)
  setTimeout(function() { t.remove() }, 3000)
}

// Unread badge
const unreadCount = helpers.getPropertyConversations(db.currentProperty.id).filter(c => c.unreadByStaff).length
if (unreadCount > 0) {
  document.getElementById('unread-badge').textContent = unreadCount
} else {
  document.getElementById('unread-badge').style.display = 'none'
}

// Get guests for this property that have conversations
const propertyGuests = helpers.filterBy(db.guests, 'propertyId', db.currentProperty.id)

// Get guest ID from URL or default
function getGuestIdFromUrl() {
  const params = new URLSearchParams(window.location.search)
  return params.get('id')
}

let currentGuestId = getGuestIdFromUrl() || propertyGuests.find(g => g.totalConversations > 0)?.id || propertyGuests[0]?.id
let currentPreferences = []
let editingName = false

// Populate guest picker
const picker = document.getElementById('guest-picker')
propertyGuests.forEach(function(g) {
  const opt = document.createElement('option')
  opt.value = g.id
  opt.textContent = g.name
  if (g.id === currentGuestId) opt.selected = true
  picker.appendChild(opt)
})
picker.addEventListener('change', function() {
  currentGuestId = this.value
  renderProfile()
})

function renderProfile() {
  const profile = helpers.getGuestProfile(currentGuestId)
  if (!profile) {
    document.querySelector('.content-inner').innerHTML = '<div class="empty-state"><h2 class="empty-title">Guest not found</h2><p class="empty-desc"><a data-slug="guests" href="guests-v1.html" style="color:var(--color-brand)">Back to guests</a></p></div>'
    return
  }

  // Breadcrumb
  document.getElementById('breadcrumb-name').textContent = profile.name

  // Avatar
  document.getElementById('guest-avatar').textContent = getInitials(profile.name)

  // Name (editable)
  const nameEl = document.getElementById('guest-name-display')
  nameEl.innerHTML = ''
  const nameSpan = document.createElement('span')
  nameSpan.className = 'guest-name-editable'
  nameSpan.textContent = profile.name
  nameSpan.title = 'Click to edit'
  nameSpan.addEventListener('click', function() {
    const input = document.createElement('input')
    input.type = 'text'
    input.className = 'guest-name-input'
    input.value = nameSpan.textContent
    nameEl.replaceChild(input, nameSpan)
    input.focus()
    input.select()
    function save() {
      const val = input.value.trim()
      if (val) {
        nameSpan.textContent = val
        document.getElementById('breadcrumb-name').textContent = val
        showToast('Guest profile updated.')
      }
      nameEl.replaceChild(nameSpan, input)
    }
    input.addEventListener('blur', save)
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') save()
      if (e.key === 'Escape') nameEl.replaceChild(nameSpan, input)
    })
  })
  nameEl.appendChild(nameSpan)

  // Phone
  document.getElementById('guest-phone').textContent = profile.phoneNumber

  // Stats
  const statsEl = document.getElementById('guest-stats')
  statsEl.innerHTML = ''
  const stat1 = document.createElement('span')
  stat1.textContent = 'First contact: ' + formatDate(profile.firstContactAt)
  const stat2 = document.createElement('span')
  stat2.textContent = profile.totalConversations + ' conversation' + (profile.totalConversations !== 1 ? 's' : '')
  statsEl.appendChild(stat1)
  statsEl.appendChild(stat2)

  // Preferences
  currentPreferences = (profile.preferences || []).slice()
  renderPreferences()

  // Notes
  document.getElementById('notes-textarea').value = profile.staffNotes || ''

  // Conversation history
  renderHistory(profile)
}

function renderPreferences() {
  const container = document.getElementById('prefs-container')
  container.innerHTML = ''

  if (currentPreferences.length === 0) {
    const empty = document.createElement('span')
    empty.style.cssText = 'font-size:var(--text-sm);color:var(--color-text-tertiary);'
    empty.textContent = 'No preferences recorded yet.'
    container.appendChild(empty)
  } else {
    currentPreferences.forEach(function(pref, idx) {
      const tag = document.createElement('span')
      tag.className = 'preference-tag-removable'
      tag.innerHTML = pref + ' <span class="remove-x" data-idx="' + idx + '">&times;</span>'
      tag.querySelector('.remove-x').addEventListener('click', function() {
        currentPreferences.splice(idx, 1)
        renderPreferences()
        showToast('Guest profile updated.')
      })
      container.appendChild(tag)
    })
  }

  // Add button
  const addBtn = document.createElement('button')
  addBtn.className = 'btn btn-ghost btn-sm'
  addBtn.textContent = '+ Add'
  addBtn.addEventListener('click', function() {
    addBtn.style.display = 'none'
    const input = document.createElement('input')
    input.type = 'text'
    input.className = 'input add-pref-input'
    input.placeholder = 'New preference...'
    container.appendChild(input)
    input.focus()
    function done() {
      const val = input.value.trim()
      if (val) {
        currentPreferences.push(val)
        showToast('Guest profile updated.')
      }
      renderPreferences()
    }
    input.addEventListener('blur', done)
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') done()
      if (e.key === 'Escape') renderPreferences()
    })
  })
  container.appendChild(addBtn)
}

function renderHistory(profile) {
  const container = document.getElementById('history-container')
  container.innerHTML = ''
  const convos = profile.conversations || []
  if (convos.length === 0) {
    container.innerHTML = '<div style="font-size:var(--text-sm);color:var(--color-text-tertiary);padding:var(--space-4) 0;">No conversations yet.</div>'
    return
  }

  // Sort by lastMessageAt desc
  const sorted = helpers.sortBy(convos, 'lastMessageAt', 'desc')
  sorted.forEach(function(conv) {
    const visit = document.createElement('div')
    visit.className = 'guest-visit'
    visit.onclick = function() { window.location.href = 'inbox-v1.html?conv=' + conv.id }

    const details = document.createElement('div')
    details.className = 'visit-details'

    const dateWrap = document.createElement('div')
    const dateEl = document.createElement('div')
    dateEl.className = 'guest-visit-date'
    dateEl.textContent = relativeDate(conv.lastMessageAt)
    const countEl = document.createElement('div')
    countEl.className = 'guest-visit-count'
    countEl.textContent = conv.messageCount + ' messages'
    const preview = document.createElement('div')
    preview.className = 'visit-preview'
    preview.textContent = conv.lastMessagePreview || ''
    dateWrap.appendChild(dateEl)
    dateWrap.appendChild(countEl)
    dateWrap.appendChild(preview)
    details.appendChild(dateWrap)

    const meta = document.createElement('div')
    meta.className = 'visit-meta'

    // Status badge
    const statusBadge = document.createElement('span')
    statusBadge.className = 'badge badge-' + conv.status
    statusBadge.textContent = conv.status.charAt(0).toUpperCase() + conv.status.slice(1)
    meta.appendChild(statusBadge)

    // Category badge
    if (conv.category) {
      const catBadge = document.createElement('span')
      catBadge.className = 'badge badge-category-' + conv.category
      catBadge.textContent = conv.category.charAt(0).toUpperCase() + conv.category.slice(1)
      meta.appendChild(catBadge)
    }

    visit.appendChild(details)
    visit.appendChild(meta)
    container.appendChild(visit)
  })
}

// Save notes
document.getElementById('save-notes-btn').addEventListener('click', function() {
  showToast('Guest profile updated.')
})

// Initial render
renderProfile()
</script>

    link.href = '/preview/' + link.dataset.slug
  })
})()
