<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script>
const db = window.MOCK_DB
const helpers = db.helpers

let allEntries = helpers.getPropertyKnowledge(db.currentProperty.id).slice()
let activeCategory = 'all'
let editingEntry = null
let showingEmpty = false

const categories = [
  { key: 'all', label: 'All' },
  { key: 'dining', label: 'Dining' },
  { key: 'nightlife', label: 'Nightlife' },
  { key: 'activities', label: 'Activities' },
  { key: 'shopping', label: 'Shopping' },
  { key: 'transport', label: 'Transport' },
  { key: 'services', label: 'Services' },
  { key: 'hotel-faq', label: 'Hotel FAQ' }
]

const categoryBadgeClass = {
  'dining': 'badge-category-dining',
  'nightlife': 'badge-category-complaint',
  'activities': 'badge-category-activities',
  'shopping': 'badge-category-information',
  'transport': 'badge-category-transport',
  'services': 'badge-category-housekeeping',
  'hotel-faq': 'badge-category-other'
}

// Unread badge
const unreadCount = helpers.getPropertyConversations(db.currentProperty.id).filter(c => c.unreadByStaff).length
if (unreadCount > 0) {
  document.getElementById('unread-badge').textContent = unreadCount
} else {
  document.getElementById('unread-badge').style.display = 'none'
}

function showToast(message, type) {
  type = type || 'success'
  const c = document.getElementById('toast-container')
  const t = document.createElement('div')
  t.className = 'toast toast-' + type
  t.textContent = message
  c.appendChild(t)
  setTimeout(function() { t.remove() }, 3000)
}

function getCategoryCounts() {
  const counts = { all: allEntries.length }
  categories.forEach(function(cat) {
    if (cat.key !== 'all') {
      counts[cat.key] = allEntries.filter(e => e.category === cat.key).length
    }
  })
  return counts
}

function renderTabs() {
  const bar = document.getElementById('tab-bar')
  bar.innerHTML = ''
  const counts = getCategoryCounts()
  categories.forEach(function(cat) {
    const tab = document.createElement('div')
    tab.className = 'tab' + (activeCategory === cat.key ? ' active' : '')
    tab.innerHTML = cat.label + ' <span class="tab-count">' + (counts[cat.key] || 0) + '</span>'
    tab.addEventListener('click', function() {
      activeCategory = cat.key
      renderTabs()
      renderGrid()
    })
    bar.appendChild(tab)
  })
}

function getFilteredEntries() {
  let entries = allEntries.slice()
  if (activeCategory !== 'all') {
    entries = helpers.filterBy(entries, 'category', activeCategory)
  }
  const q = document.getElementById('search-input').value
  if (q) {
    entries = helpers.search(entries, ['title', 'description'], q)
  }
  return entries
}

function renderGrid() {
  const entries = getFilteredEntries()
  const grid = document.getElementById('knowledge-grid')
  const noResults = document.getElementById('no-results')
  const countEl = document.getElementById('entry-count')

  countEl.textContent = entries.length + ' entr' + (entries.length === 1 ? 'y' : 'ies')

  if (entries.length === 0) {
    grid.style.display = 'none'
    noResults.style.display = ''
    return
  }

  grid.style.display = ''
  noResults.style.display = 'none'
  grid.innerHTML = ''

  entries.forEach(function(entry) {
    const card = document.createElement('div')
    card.className = 'knowledge-card'
    card.onclick = function() { openEditModal(entry) }

    const header = document.createElement('div')
    header.className = 'knowledge-card-header'
    const title = document.createElement('div')
    title.className = 'knowledge-card-title'
    title.textContent = entry.title
    const badge = document.createElement('span')
    badge.className = 'knowledge-category-badge ' + (categoryBadgeClass[entry.category] || 'badge-category-other')
    badge.textContent = entry.category === 'hotel-faq' ? 'Hotel FAQ' : entry.category.charAt(0).toUpperCase() + entry.category.slice(1)
    header.appendChild(title)
    header.appendChild(badge)

    const desc = document.createElement('div')
    desc.className = 'knowledge-card-desc'
    desc.textContent = entry.description

    card.appendChild(header)
    card.appendChild(desc)

    if (entry.url || entry.hours) {
      const footer = document.createElement('div')
      footer.className = 'knowledge-card-footer'
      if (entry.url) {
        const link = document.createElement('a')
        link.className = 'knowledge-card-link'
        link.href = entry.url
        link.target = '_blank'
        link.onclick = function(e) { e.stopPropagation() }
        link.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg> Link'
        footer.appendChild(link)
      }
      if (entry.hours) {
        const hrs = document.createElement('span')
        hrs.className = 'knowledge-card-hours'
        hrs.textContent = entry.hours
        footer.appendChild(hrs)
      }
      card.appendChild(footer)
    }

    grid.appendChild(card)
  })
}

// Modal functions
function openAddModal() {
  editingEntry = null
  document.getElementById('modal-title').textContent = 'Add Entry'
  document.getElementById('modal-entry-title').value = ''
  document.getElementById('modal-entry-category').value = 'dining'
  document.getElementById('modal-entry-desc').value = ''
  document.getElementById('modal-entry-url').value = ''
  document.getElementById('modal-entry-hours').value = ''
  document.getElementById('modal-delete-btn').style.display = 'none'
  document.getElementById('entry-modal').style.display = ''
}

function openEditModal(entry) {
  editingEntry = entry
  document.getElementById('modal-title').textContent = 'Edit Entry'
  document.getElementById('modal-entry-title').value = entry.title
  document.getElementById('modal-entry-category').value = entry.category
  document.getElementById('modal-entry-desc').value = entry.description
  document.getElementById('modal-entry-url').value = entry.url || ''
  document.getElementById('modal-entry-hours').value = entry.hours || ''
  document.getElementById('modal-delete-btn').style.display = ''
  document.getElementById('entry-modal').style.display = ''
}

function closeModal() {
  document.getElementById('entry-modal').style.display = 'none'
  editingEntry = null
}

function saveEntry() {
  const title = document.getElementById('modal-entry-title').value.trim()
  if (!title) return

  if (editingEntry) {
    editingEntry.title = title
    editingEntry.category = document.getElementById('modal-entry-category').value
    editingEntry.description = document.getElementById('modal-entry-desc').value.trim()
    editingEntry.url = document.getElementById('modal-entry-url').value.trim() || null
    editingEntry.hours = document.getElementById('modal-entry-hours').value.trim() || null
  } else {
    allEntries.push({
      id: 'ke_new_' + Date.now(),
      propertyId: db.currentProperty.id,
      title: title,
      category: document.getElementById('modal-entry-category').value,
      description: document.getElementById('modal-entry-desc').value.trim(),
      url: document.getElementById('modal-entry-url').value.trim() || null,
      hours: document.getElementById('modal-entry-hours').value.trim() || null,
      seasonalStart: null,
      seasonalEnd: null,
      createdAt: new Date().toISOString(),
      updatedAt: null
    })
  }

  closeModal()
  renderTabs()
  renderGrid()
  showToast('Entry saved.')
}

function confirmDelete() {
  if (!editingEntry) return
  document.getElementById('delete-body').textContent = editingEntry.title + ' will be permanently removed.'
  document.getElementById('delete-modal').style.display = ''
}

function closeDeleteModal() {
  document.getElementById('delete-modal').style.display = 'none'
}

function doDelete() {
  if (!editingEntry) return
  allEntries = allEntries.filter(e => e.id !== editingEntry.id)
  closeDeleteModal()
  closeModal()
  renderTabs()
  renderGrid()
  showToast('Entry removed.')
}

// Add entry button
document.getElementById('add-entry-btn').addEventListener('click', openAddModal)

// Search
document.getElementById('search-input').addEventListener('input', renderGrid)

// Toggle empty
function toggleEmpty() {
  showingEmpty = !showingEmpty
  const btn = document.getElementById('toggle-empty-btn')
  if (showingEmpty) {
    document.getElementById('knowledge-grid').style.display = 'none'
    document.getElementById('no-results').style.display = 'none'
    document.getElementById('empty-state').style.display = ''
    document.getElementById('tab-bar').style.display = 'none'
    document.getElementById('entry-count').style.display = 'none'
    document.querySelector('.search-row').style.display = 'none'
    document.getElementById('add-entry-btn').style.display = 'none'
    btn.textContent = 'Show populated'
  } else {
    document.getElementById('empty-state').style.display = 'none'
    document.getElementById('tab-bar').style.display = ''
    document.getElementById('entry-count').style.display = ''
    document.querySelector('.search-row').style.display = ''
    document.getElementById('add-entry-btn').style.display = ''
    btn.textContent = 'Show empty state'
    renderTabs()
    renderGrid()
  }
}

// Initial render
renderTabs()
renderGrid()
</script>

;(function() {
  var isLocal = window.location.protocol === 'file:'
  if (isLocal) return
  document.querySelectorAll('a[data-slug]').forEach(function(link) {
    link.href = '/preview/' + link.dataset.slug
  })
})()
</script>
