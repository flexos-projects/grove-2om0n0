<script>
const db = window.MOCK_DB
const helpers = db.helpers

// State
let showEmpty = false
let allGuests = helpers.filterBy(db.guests, 'propertyId', db.currentProperty.id)

// Unread badge
const unreadCount = helpers.getPropertyConversations(db.currentProperty.id).filter(c => c.unreadByStaff).length
if (unreadCount > 0) {
  document.getElementById('unread-badge').textContent = unreadCount
} else {
  document.getElementById('unread-badge').style.display = 'none'
}

function getInitials(name) {
  return name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase()
}

function relativeDate(isoDate) {
  if (!isoDate) return 'Never'
  const d = new Date(isoDate)
  const now = new Date('2026-03-15')
  const diffMs = now - d
  const diffDays = Math.floor(diffMs / 86400000)
  if (diffDays === 0) return 'Today'
  if (diffDays === 1) return 'Yesterday'
  if (diffDays < 7) return diffDays + ' days ago'
  if (diffDays < 30) return Math.floor(diffDays / 7) + 'w ago'
  if (diffDays < 365) return Math.floor(diffDays / 30) + 'mo ago'
  return Math.floor(diffDays / 365) + 'y ago'
}

function renderGuests() {
  const searchQuery = document.getElementById('search-input').value
  const sortField = document.getElementById('sort-select').value

  let guests = allGuests.slice()

  // Search filter
  if (searchQuery) {
    guests = helpers.search(guests, ['name', 'phoneNumber'], searchQuery)
  }

  // Sort
  const sortDir = sortField === 'name' ? 'asc' : 'desc'
  guests = helpers.sortBy(guests, sortField, sortDir)

  const tbody = document.getElementById('guest-tbody')
  tbody.innerHTML = ''

  // Update count
  document.getElementById('guest-count').textContent = guests.length + ' guest' + (guests.length !== 1 ? 's' : '')

  if (guests.length === 0 && searchQuery) {
    tbody.innerHTML = '<tr class="no-results-row"><td colspan="4">No guests match your search.</td></tr>'
    return
  }

  guests.forEach(function(guest) {
    const tr = document.createElement('tr')
    tr.style.cursor = 'pointer'
    tr.onclick = function() {
      window.location.href = 'guest-profile-v1.html?id=' + guest.id
    }

    // Guest cell
    const tdGuest = document.createElement('td')
    const info = document.createElement('div')
    info.className = 'guest-cell-info'

    const avatar = document.createElement('div')
    avatar.className = 'guest-avatar-sm'
    avatar.textContent = getInitials(guest.name)

    const nameBlock = document.createElement('div')
    nameBlock.className = 'guest-name-cell'
    const nameText = document.createElement('div')
    nameText.className = 'guest-name-text'
    nameText.textContent = guest.name
    const phoneText = document.createElement('div')
    phoneText.className = 'guest-phone-text'
    phoneText.textContent = guest.phoneNumber
    nameBlock.appendChild(nameText)
    nameBlock.appendChild(phoneText)

    info.appendChild(avatar)
    info.appendChild(nameBlock)
    tdGuest.appendChild(info)

    // Last contact
    const tdContact = document.createElement('td')
    tdContact.textContent = relativeDate(guest.lastContactAt)
    tdContact.style.color = 'var(--color-text-secondary)'

    // Conversations
    const tdConvos = document.createElement('td')
    tdConvos.textContent = guest.totalConversations
    tdConvos.style.color = 'var(--color-text-secondary)'

    // Preferences
    const tdPrefs = document.createElement('td')
    const prefsDiv = document.createElement('div')
    prefsDiv.className = 'preference-tags'
    const prefs = guest.preferences || []
    const showCount = 3
    prefs.slice(0, showCount).forEach(function(p) {
      const tag = document.createElement('span')
      tag.className = 'preference-tag'
      tag.textContent = p
      prefsDiv.appendChild(tag)
    })
    if (prefs.length > showCount) {
      const more = document.createElement('span')
      more.className = 'pref-more'
      more.textContent = '+' + (prefs.length - showCount) + ' more'
      prefsDiv.appendChild(more)
    }
    if (prefs.length === 0) {
      prefsDiv.style.color = 'var(--color-text-tertiary)'
      prefsDiv.textContent = '-'
    }
    tdPrefs.appendChild(prefsDiv)

    tr.appendChild(tdGuest)
    tr.appendChild(tdContact)
    tr.appendChild(tdConvos)
    tr.appendChild(tdPrefs)
    tbody.appendChild(tr)
  })
}

// Search and sort listeners
document.getElementById('search-input').addEventListener('input', renderGuests)
document.getElementById('sort-select').addEventListener('change', renderGuests)

// Toggle empty state
function toggleEmpty() {
  showEmpty = !showEmpty
  const btn = document.getElementById('toggle-empty-btn')
  if (showEmpty) {
    document.getElementById('guest-table-wrapper').style.display = 'none'
    document.getElementById('empty-state').style.display = ''
    document.querySelector('.search-sort-row').style.display = 'none'
    document.getElementById('guest-count').textContent = '0 guests'
    btn.textContent = 'Show populated'
  } else {
    document.getElementById('guest-table-wrapper').style.display = ''
    document.getElementById('empty-state').style.display = 'none'
    document.querySelector('.search-sort-row').style.display = ''
    btn.textContent = 'Show empty state'
    renderGuests()
  }
}

// Initial render
renderGuests()
</script>
