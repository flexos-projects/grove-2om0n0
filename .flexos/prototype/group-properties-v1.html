<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script>
  const { createApp, ref, onMounted } = Vue
  const db = window.MOCK_DB

  createApp({
    setup() {
      const showAddModal = ref(false)
      const newPropertyName = ref('')
      const newPropertyAddress = ref('')
      const newPropertyTimezone = ref('Europe/Berlin')

      const group = db.groups[0]
      const groupId = group.id

      function showToast(message, type) {
        type = type || 'success'
        const c = document.getElementById('toast-container')
        if (!c) return
        const t = document.createElement('div')
        t.className = 'toast toast-' + type
        t.textContent = message
        c.appendChild(t)
        setTimeout(function() { t.remove() }, 3000)
      }

      function addProperty() {
        if (!newPropertyName.value.trim()) {
          showToast('Please enter a property name.', 'error')
          return
        }
        showAddModal.value = false
        showToast('Property added: ' + newPropertyName.value, 'success')
        newPropertyName.value = ''
        newPropertyAddress.value = ''
        newPropertyTimezone.value = 'Europe/Berlin'
      }

      function openProperty(propertyId) {
        showToast('Opening property settings...', 'info')
        setTimeout(function() {
          window.location.href = 'settings-v1.html'
        }, 600)
      }

      onMounted(function() {
        var properties = db.helpers.getGroupProperties(groupId)
        var meta = document.getElementById('properties-meta')
        meta.textContent = properties.length + (properties.length === 1 ? ' property' : ' properties') + ' in ' + group.name

        var grid = document.getElementById('property-grid')
        grid.innerHTML = properties.map(function(prop) {
          var stats = db.helpers.getDashboardStats(prop.id)
          var team = db.helpers.getPropertyTeam(prop.id)
          var tierLabel = prop.planTier.charAt(0).toUpperCase() + prop.planTier.slice(1)

          return '<div class="property-card" onclick="document.querySelector(\'#app\').__vue_app__._instance.proxy.openProperty(\'' + prop.id + '\')">' +
            '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-3)">' +
              '<h3 class="property-card-name">' + prop.name + '</h3>' +
              '<span class="badge badge-active">' + tierLabel + '</span>' +
            '</div>' +
            '<div class="property-card-address">' + prop.address + '</div>' +
            '<div class="property-card-phone">' + prop.phoneNumber + '</div>' +
            '<div class="property-card-stats">' +
              '<span class="property-card-stat"><strong>' + stats.totalConversations + '</strong> conversations</span>' +
              '<span class="property-card-stat"><strong>' + team.length + '</strong> team ' + (team.length === 1 ? 'member' : 'members') + '</span>' +
            '</div>' +
            '<div class="property-card-footer">' +
              '<button class="btn btn-ghost btn-sm">Manage</button>' +
            '</div>' +
          '</div>'
        }).join('')
      })

      return {
        showAddModal,
        newPropertyName,
        newPropertyAddress,
        newPropertyTimezone,
        addProperty,
        openProperty,
        showToast
      }
    }
  }).mount('#app')
</script>
